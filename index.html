<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery - CodeAlpha Task</title>
<style>
body {
  background: #0a0a0a;
  color: #fff;
  font-family: 'Poppins', Arial, sans-serif;
  padding: 20px;
  margin: 0;
  min-height: 100vh;
}
h1 {
  text-align: center;
  color: #00ff88;
  text-shadow: 0 0 15px #00ff88;
  font-size: 2.5rem;
  margin-bottom: 30px;
}
.filters {
  text-align: center;
  margin-bottom: 30px;
}
.filter-btn {
  background: #1a1a1a;
  color: #fff;
  border: 2px solid #00ff88;
  padding: 10px 20px;
  margin: 5px;
  border-radius: 25px;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}
.filter-btn:hover, .filter-btn.active {
  background: #00ff88;
  color: #0a0a0a;
  box-shadow: 0 0 15px #00ff88;
}
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}
.gallery-item {
  background: #1a1a1a;
  border-radius: 15px;
  overflow: hidden;
  border: 1px solid #333;
  transition: 0.3s;
}
.gallery-item:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(0,255,136,0.5);
}
.gallery-item img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
}
.gallery-item p {
  padding: 10px;
  text-align: center;
  margin: 0;
  color: #00ff88;
  font-weight: 500;
}
</style>
</head>
<body>

<h1>My Image Gallery</h1>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="nature">Nature</button>
  <button class="filter-btn" data-filter="car">Car</button>
  <button class="filter-btn" data-filter="tech">Tech</button>
  <button class="filter-btn" data-filter="bags">Bags</button>
</div>

<div class="gallery">
 
  <div class="gallery-item" data-category="nature"><img src="./images/nature1.jpg"alt="Nature 1"><p>Mountain Lake</p></div>
  <div class="gallery-item" data-category="nature"><img src="./images/nature2.jpg"alt="Nature 2"><p>Forest Path</p></div>
  <div class="gallery-item" data-category="nature"><img src="./images/nature3.jpg" alt="Nature 3"><p>Green Forest</p></div>
  <div class="gallery-item" data-category="nature"><img src="./images/nature4.jpg"alt="Nature 4"><p>Waterfall</p></div>
  <div class="gallery-item" data-category="nature"><img src="./images/nature5.jpg"alt="Nature 5"><p>Sunset Valley</p></div>


  <div class="gallery-item" data-category="car"><img src="./images/car1.jpg" alt="Car 1"><p>Red Mustang</p></div>
  <div class="gallery-item" data-category="car"><img src="./images/car2.jpg" alt="Car 2"><p>Luxury Sedan</p></div>
  <div class="gallery-item" data-category="car"><img src="./images/car3.jpg" alt="Car 3"><p>Classic Car</p></div>
  <div class="gallery-item" data-category="car"><img src="./images/car4.jpg"alt="Car 4"><p>Sports Car</p></div>
<div class="gallery-item" data-category="car"><img src="./images/car5.jpg"alt="Car 5"><p>Blue Coupe</p></div>

 
  <div class="gallery-item" data-category="tech"><img src="./images/tech1.jpg" alt="Tech 1"><p>Setup Desk</p></div>
  <div class="gallery-item" data-category="tech"><img src="./images/tech2.jpg" alt="Tech 2"><p>MacBook Pro</p></div>
  <div class="gallery-item" data-category="tech"><img src="./images/tech3.jpg" alt="Tech 3"><p>Camera Lens</p></div>
  <div class="gallery-item" data-category="tech"><img src="./images/tech4.jpg" alt="Tech 4"><p>Gaming Setup</p></div>
  <div class="gallery-item" data-category="tech"><img src="./images/tech5.jpg" alt="Tech 5"><p>Circuit Board</p></div>

 
  <div class="gallery-item" data-category="bags"><img src="./images/bag1.jpg" alt="Bags 1"><p>Travel Bag</p></div>
  <div class="gallery-item" data-category="bags"><img src="./images/bag2.jpg" alt="Bags 2"><p>Backpack</p></div>
  <div class="gallery-item" data-category="bags"><img src="./images/bag3.jpg" alt="Bags 3"><p>Handbag</p></div>
 <div class="gallery-item" data-category="bags"><img src="./images/bag4.jpg" alt="Bags 4"><p>Leather Bag</p></div>
  <div class="gallery-item" data-category="bags"><img src="./images/bag5.jpg" alt="Bags 5"><p>School Bag</p></div>
</div>
<script>
const buttons = document.querySelectorAll('.filter-btn');
const items = document.querySelectorAll('.gallery-item');

buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    const filter = btn.getAttribute('data-filter');
    
    items.forEach(item => {
      if(filter === 'all' || item.getAttribute('data-category') === filter) {
        item.style.display = 'block';
      } else {
        item.style.display = 'none';
      }
    });
  });
});
</script>

</body>
</html>
