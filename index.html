<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery - CodeAlpha Task</title>
<style>
body {
  background: #0a0a0a;
  color: #fff;
  font-family: 'Poppins', Arial, sans-serif;
  padding: 20px;
  margin: 0;
  min-height: 100vh;
}
h1 {
  text-align: center;
  color: #00ff88;
  text-shadow: 0 0 15px #00ff88;
  font-size: 2.5rem;
  margin-bottom: 30px;
}
.filters {
  text-align: center;
  margin-bottom: 30px;
}
.filter-btn {
  background: #1a1a1a;
  color: #fff;
  border: 2px solid #00ff88;
  padding: 10px 20px;
  margin: 5px;
  border-radius: 25px;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}
.filter-btn:hover, .filter-btn.active {
  background: #00ff88;
  color: #0a0a0a;
  box-shadow: 0 0 15px #00ff88;
}
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}
.gallery-item {
  background: #1a1a1a;
  border-radius: 15px;
  overflow: hidden;
  border: 1px solid #333;
  transition: 0.3s;
}
.gallery-item:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(0,255,136,0.5);
}
.gallery-item img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
}
.gallery-item p {
  padding: 10px;
  text-align: center;
  margin: 0;
  color: #00ff88;
  font-weight: 500;
}
</style>
</head>
<body>

<h1>My Image Gallery</h1>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="nature">Nature</button>
  <button class="filter-btn" data-filter="car">Car</button>
  <button class="filter-btn" data-filter="tech">Tech</button>
  <button class="filter-btn" data-filter="bags">Bags</button>
</div>

<div class="gallery">
  <div class="gallery-item" data-category="nature"><img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=500" alt="Nature"><p>Mountain Lake</p></div>
  <div class="gallery-item" data-category="car"><img src="https://images.unsplash.com/photo-1542362567-b07e54358753?w=500" alt="Car"><p>Red Mustang</p></div>
  <div class="gallery-item" data-category="tech"><img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=500" alt="Tech"><p>Setup Desk</p></div>
  <div class="gallery-item" data-category="bags"><img src="https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=500" alt="Bags"><p>Travel Bag</p></div>
  <div class="gallery-item" data-category="nature"><img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=500" alt="Nature 2"><p>Forest Path</p></div>
</div>

<script>
const buttons = document.querySelectorAll('.filter-btn');
const items = document.querySelectorAll('.gallery-item');

buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    const filter = btn.getAttribute('data-filter');
    
    items.forEach(item => {
      if(filter === 'all' || item.getAttribute('data-category') === filter) {
        item.style.display = 'block';
      } else {
        item.style.display = 'none';
      }
    });
  });
});
</script>

</body>
</html>
