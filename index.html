<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

<h1>My Image Gallery</h1>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="nature">Nature</button>
  <button class="filter-btn" data-filter="car">Car</button>
  <button class="filter-btn" data-filter="tech">Tech</button>
  <button class="filter-btn" data-filter="bags">Bags</button>
</div>

<div class="gallery">
 
  <div class="gallery-item" data-category="nature"><img src="nature1.jpg"alt="Nature 1"><p>Mountain Lake</p></div>
  <div class="gallery-item" data-category="nature"><img src="nature2.jpg"alt="Nature 2"><p>Forest Path</p></div>
  <div class="gallery-item" data-category="nature"><img src="nature3.jpg" alt="Nature 3"><p>Green Forest</p></div>
  <div class="gallery-item" data-category="nature"><img src="nature4.jpg"alt="Nature 4"><p>Waterfall</p></div>
  <div class="gallery-item" data-category="nature"><img src="nature5.jpg"alt="Nature 5"><p>Sunset Valley</p></div>


  <div class="gallery-item" data-category="car"><img src="car1.jpg" alt="Car 1"><p>Red Mustang</p></div>
  <div class="gallery-item" data-category="car"><img src="car2.jpg" alt="Car 2"><p>Luxury Sedan</p></div>
  <div class="gallery-item" data-category="car"><img src="car3.jpg" alt="Car 3"><p>Classic Car</p></div>
  <div class="gallery-item" data-category="car"><img src="car4.jpg"alt="Car 4"><p>Sports Car</p></div>
<div class="gallery-item" data-category="car"><img src="car5.jpg"alt="Car 5"><p>Blue Coupe</p></div>

 
  <div class="gallery-item" data-category="tech"><img src="tech1.jpg" alt="Tech 1"><p>Setup Desk</p></div>
  <div class="gallery-item" data-category="tech"><img src="tech2.jpg" alt="Tech 2"><p>MacBook Pro</p></div>
  <div class="gallery-item" data-category="tech"><img src="tech3.jpg" alt="Tech 3"><p>Camera Lens</p></div>
  <div class="gallery-item" data-category="tech"><img src="tech4.jpg" alt="Tech 4"><p>Gaming Setup</p></div>
  <div class="gallery-item" data-category="tech"><img src="tech5.jpg" alt="Tech 5"><p>Circuit Board</p></div>

 
  <div class="gallery-item" data-category="bags"><img src="bag1.jpg" alt="Bags 1"><p>Travel Bag</p></div>
  <div class="gallery-item" data-category="bags"><img src="bag2.jpg" alt="Bags 2"><p>Backpack</p></div>
  <div class="gallery-item" data-category="bags"><img src="bag3.jpg" alt="Bags 3"><p>Handbag</p></div>
 <div class="gallery-item" data-category="bags"><img src="bag4.jpg" alt="Bags 4"><p>Leather Bag</p></div>
  <div class="gallery-item" data-category="bags"><img src="bag5.jpg" alt="Bags 5"><p>School Bag</p></div>
</div>

    <script src="./script.js"></script>
</body>
</html>
